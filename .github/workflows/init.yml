name: 初始化字幕仓库 (Initialize Subtitle Repo)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout subtitle-repo-actions
        uses: actions/checkout@v4
        with:
          repository: MontageSubs/subtitle-repo-actions
          path: .actions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run orchestration script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPSTACK_API_KEY: ${{ secrets.SERPSTACK_API_KEY }}
        run: |
          python .actions/init/orchestrate.py \
            --repo-name "${{ github.event.repository.name }}" \
            --github-repository "${{ github.repository }}"

      - name: Commit README
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          # Attribute the commit to whoever triggered the workflow, not a bot.
          # 提交归属于触发工作流的人，而非机器人账号。
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-init repository metadata"
          git push
