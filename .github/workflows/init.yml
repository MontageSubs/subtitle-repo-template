name: 初始化 (Initialize)

on:
  workflow_dispatch:
    inputs:
      force_init:
        description: "强制初始化：仅在 TMDB 未找到匹配影片时生效，跳过校验生成空白模板，标题/海报/简介需自行填写 / Force init: only takes effect when TMDB finds no match — skips validation and generates a blank template, title/poster/synopsis must be filled manually"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout subtitle-repo-actions
        uses: actions/checkout@v4
        with:
          repository: MontageSubs/subtitle-repo-actions
          path: .actions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run orchestration script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPSTACK_API_KEY: ${{ secrets.SERPSTACK_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_ACTOR_ID: ${{ github.actor_id }}
        run: |
          python .actions/init/main.py \
            --repo-name "${{ github.event.repository.name }}" \
            --github-repository "${{ github.repository }}" \
            ${{ github.event.inputs.force_init == 'true' && '--force-init' || '' }}

      - name: Commit README
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-init repository metadata"
          git push
