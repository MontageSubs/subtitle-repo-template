name: 初始化 (Initialize)

on:
  workflow_dispatch:
    inputs:
      force_init:
        description: "强制初始化：覆盖现有文件并重新初始化；未匹配时生成空白模板 / Force init: Overwrite files and re-initialize; generate blank template if no match"
        type: boolean
        default: false
      manual_id:
        description: "手动指定 TMDB/IMDb ID 或 URL（可选，留空则按仓库名自动搜索 TMDB）/ Optional manual TMDB/IMDb ID or URL"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout subtitle-repo-actions
        uses: actions/checkout@v4
        with:
          repository: MontageSubs/subtitle-repo-actions
          path: .actions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run orchestration script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPSTACK_API_KEY: ${{ secrets.SERPSTACK_API_KEY }}
          GOOGLE_LLM_TOKEN: ${{ secrets.GOOGLE_LLM_TOKEN }}
          HUGGINGFACE_LLM_TOKEN: ${{ secrets.HUGGINGFACE_LLM_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_ACTOR_ID: ${{ github.actor_id }}
          FORCE_INIT: ${{ github.event.inputs.force_init }}
          MANUAL_ID: ${{ github.event.inputs.manual_id }}
        run: |
          ARGS=(--repo-name "${{ github.event.repository.name }}" --github-repository "${{ github.repository }}")
          if [ "$FORCE_INIT" = "true" ]; then ARGS+=(--force-init); fi
          if [ -n "$MANUAL_ID" ]; then ARGS+=(--manual-id "$MANUAL_ID"); fi
          python .actions/actions/init/main.py "${ARGS[@]}"

      - name: Commit README and synopsis
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          git add README.md
          [ -d docs/synopsis ] && git add docs/synopsis
          git diff --cached --quiet || git commit -m "chore: auto-init repository metadata"
          git push
